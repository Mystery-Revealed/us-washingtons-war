# render.yaml — one Render web service builds the client and starts the
# Socket.IO server (same deploy shape as the companion U.S. History games).
services:
  - type: web
    name: us-washingtons-war
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/src/index.js
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
